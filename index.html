/* ---------------- 表を読む道具 ---------------- */

// CSV（カンマ区切りの表）を行と列に分解する。引用符で囲まれたカンマも正しく扱う
function parseCSV(text) {
  text = text.replace(/^﻿/, "");
  const rows = [];
  let row = [], field = "", inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuote) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; } else { inQuote = false; }
      } else { field += c; }
    } else if (c === '"') { inQuote = true; }
    else if (c === ",") { row.push(field); field = ""; }
    else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
    else if (c !== "\r") { field += c; }
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// 1行目を見出しにして、各行を「見出し→値」の形にする。空行は捨てる
function toObjects(rows) {
  if (!rows.length) return [];
  const head = rows[0].map(h => h.trim());
  return rows.slice(1)
    .filter(r => r.some(c => c.trim() !== ""))
    .map(r => Object.fromEntries(head.map((h, i) => [h, (r[i] ?? "").trim()])));
}

// "21:10" を、0時から数えた分に直す。書式が違えば null
// Googleスプレッドシートが時刻として解釈すると "21:10:00" の形で出てくることがあるので、
// 秒付きと全角コロンも受け付ける
function toMin(hhmm) {
  const s = String(hhmm ?? "").trim().replace(/：/g, ":");
  const m = /^(\d{1,2}):(\d{2})(?::\d{2})?$/.exec(s);
  if (!m) return null;
  const h = Number(m[1]), mi = Number(m[2]);
  if (h > 23 || mi > 59) return null;
  return h * 60 + mi;
}

// "2026-09-20" を年月日に分ける。Googleスプレッドシートが日付として解釈すると
// "2026/09/20" の形で出てくることがあるので、区切りは - と / の両方を受け付ける
function parseDate(str) {
  const m = /^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/.exec(String(str ?? "").trim());
  return m ? { y: Number(m[1]), mo: Number(m[2]), d: Number(m[3]) } : null;
}

function fmt(totalMin) {
  const h = Math.floor(totalMin / 60) % 24, m = totalMin % 60;
  return h + ":" + String(m).padStart(2, "0");
}

// 1つでも表を読めずに予備データを使ったら true になる。
// このときは画面の一番上に警告を出し、「古いかもしれない内容」を黙って見せない。
let usedFallback = false;

async function loadCSV(key) {
  try {
    const res = await fetch(CSV_URL[key], { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return toObjects(parseCSV(await res.text()));
  } catch (e) {
    console.warn("表を読めなかったので予備データを使います（" + key + "）:", e.message);
    usedFallback = true;
    return toObjects(parseCSV(FALLBACK[key]));
  }
}

    sp.style.transform = "rotate(" + (-24 + (i * 13) % 48) + "deg)";

}

function stageKey(str) { return String(str ?? "").replace(/[\r\n]/g, "").trim(); }

function buildStages(stages, actRows) {
  const stagesEl = document.getElementById("stages");

  const boardH = (state.axisEnd - state.axisStart) * PX_PER_MIN;
  const anyPlaylist = stages.some(s => s["再生リストURL"]);
  const anyMC = stages.some(s => s["司会者名"]);

  stages.forEach((s, i) => {
    const color = STAGE_COLORS[i % STAGE_COLORS.length];
    const col = document.createElement("div");
    col.className = "stage";

    const group = document.createElement("div");
    group.className = "stage-head-group";

    const head = document.createElement("div");
    head.className = "stage-head";
    head.style.background = color;
    head.textContent = String(s["ステージ名"] ?? "").replace(/\r\n?/g, "\n");
    group.appendChild(head);

    // 再生リストの段。どれか1つでもアドレスがあれば、全列に同じ高さの段を作る
    // （片方だけ段があると、列ごとに時間軸がずれてしまうため）
    if (anyPlaylist) {
      const row = document.createElement("div");
      row.className = "playlist-row";
      const url = s["再生リストURL"];
      if (url) {
        const a = document.createElement("a");

        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.style.setProperty("--sc", color);
        const tri = document.createElement("span");
        tri.className = "tri";
        tri.textContent = state.labels.play;
        a.append(tri, document.createTextNode(" " + state.labels.saisei));
        a.setAttribute("aria-label", s["ステージ名"] + " の" + state.labels.saisei + "を開く");
        row.appendChild(a);
      } else {
        row.classList.add("empty");
      }
      group.appendChild(row);
    }

    col.appendChild(group);

    // 司会者名の段。貼り付くかたまり（group）の外に置くので、スクロールすると
    // ステージ名・再生リストと違って流れて消える。
    // どれか1つでも名前があれば、全列に同じ高さの段を作る（列ごとに時間軸がずれないように）
    if (anyMC) {
      const mcRow = document.createElement("div");
      mcRow.className = "mc-row";
      const mcName = s["司会者名"];
      if (mcName) {
        const mc = document.createElement("div");
        mc.className = "mc";
        mc.style.setProperty("--sc", color);
        mc.textContent = state.labels.shikai + mcName;
        mcRow.appendChild(mc);
      } else {
        mcRow.classList.add("empty");
      }
      col.appendChild(mcRow);
    }

    const lane = document.createElement("div");
    lane.className = "lane";
    lane.style.height = boardH + "px";

    actRows.filter(a => stageKey(a["ステージ"]) === stageKey(s["ステージ名"])).forEach(a => {
      const start = toMin(a["開始時刻"]);
      const dur = Number(a["演奏時間"]);
      if (start === null || !(dur > 0)) {
        console.warn("時刻か演奏時間が読めない行を飛ばしました:", a);
        return;
      }
      const el = document.createElement("div");
      el.className = "act";
      el.style.borderLeftColor = color;
      el.style.top = ((start - state.axisStart) * PX_PER_MIN) + "px";
      el.style.height = (dur * PX_PER_MIN - 3) + "px";
      const name = document.createElement("div");
      name.className = "name";
      name.textContent = a["パフォーマー名"];
      const song = document.createElement("div");
      song.className = "song";
      song.textContent = a["曲名"];
      el.append(name, song);
      lane.appendChild(el);
      state.acts.push({ el, start, end: start + dur });
    });

    col.appendChild(lane);
    stagesEl.appendChild(col);
  });
}

// 目盛りと全体進行の帯を、実際に描かれた位置に合わせて置く
function placeOverlays(events) {
  const board = document.getElementById("board");
  const ruler = document.getElementById("ruler");
  const stagesEl = document.getElementById("stages");
  const lane = stagesEl.querySelector(".lane");
  if (!lane) return;

  board.querySelectorAll(".tickline").forEach(e => e.remove());
  stagesEl.querySelectorAll(".eventband").forEach(e => e.remove());
  ruler.textContent = "";

  const laneRect = lane.getBoundingClientRect();
  const topInBoard = laneRect.top - board.getBoundingClientRect().top;
  const topInRuler = laneRect.top - ruler.getBoundingClientRect().top;
  const topInStages = laneRect.top - stagesEl.getBoundingClientRect().top;
  const total = state.axisEnd - state.axisStart;

  ruler.style.height = (topInRuler + total * PX_PER_MIN) + "px";
  for (let m = 0; m <= total; m += 15) {
    const t = document.createElement("div");
    t.className = "tick" + ((state.axisStart + m) % 60 === 0 ? " hour" : "");
    t.style.top = (topInRuler + m * PX_PER_MIN) + "px";
    t.textContent = fmt(state.axisStart + m);
    ruler.appendChild(t);

    const line = document.createElement("div");
    line.className = "tickline";
    line.style.top = (topInBoard + m * PX_PER_MIN) + "px";
    board.appendChild(line);
  }

  events.forEach(ev => {
    const s = toMin(ev["開始時刻"]), e = toMin(ev["終了時刻"]);
    if (s === null || e === null || e <= s) {
      console.warn("時刻が読めない進行の行を飛ばしました:", ev);
      return;
    }
    const band = document.createElement("div");
    band.className = "eventband";
    band.style.top = (topInStages + (s - state.axisStart) * PX_PER_MIN) + "px";
    band.style.height = ((e - s) * PX_PER_MIN - 3) + "px";
    const label = document.createElement("span");
    const bandMark = (state.labels && state.labels.onpu) ? state.labels.onpu + " " : "";
    label.textContent = bandMark + ev["内容"] + "　";
    const time = document.createElement("span");
    time.className = "em";
    time.textContent = fmt(s) + "〜" + fmt(e);
    label.appendChild(time);
    band.appendChild(label);
    stagesEl.appendChild(band);
  });
}

/* 「いま」が何分か。開催日当日でなければ null、開催日が未設定なら見本の時刻 */
function currentMinutes() {
  const d = state.eventDate;
  if (!d) return toMin(DEMO_TIME);
  const now = new Date();
  if (now.getFullYear() !== d.y || now.getMonth() + 1 !== d.mo || now.getDate() !== d.d) return null;
  return now.getHours() * 60 + now.getMinutes();
}

function updateNow() {
  const now = currentMinutes();
  let glowing = 0;
  state.acts.forEach(a => {
    const on = now !== null && now >= a.start && now < a.end;
    if (on) glowing++;
    a.el.classList.toggle("now", on);
  });
  return { now, glowing };
}

async function main() {
  drawDecorations();

  const [settingsRows, stageRows, actRows, eventRows] = await Promise.all(
    ["settings", "stages", "acts", "events"].map(loadCSV)
  );

  const settings = Object.fromEntries(settingsRows.map(r => [r["項目"], r["値"]]));
  state.eventDate = parseDate(settings["開催日"]);
  if (settings["開催日"] && !state.eventDate) {
    console.warn('「設定」タブの開催日「' + settings["開催日"]
      + '」が読めないので、見本モードで表示します。2026-09-20 の形で入れてください。');
  }

  // 画面に出る言葉・記号を「設定」タブから読む道具。
  // ・その行が無い → 既定値（今までどおりの文字）
  // ・行があって空欄 → その文字を消す（＝表示しない）
  // これで「行を足さなければ今のまま」「足して空にすれば消える」が両立する。
  const S = (key, def) => (key in settings) ? settings[key] : def;
  const T = {
    onpu:   S("音符マーク", "♪"),
    mic:    S("司会マーク", "🎤"),
    play:   S("再生マーク", "▶"),
    kaijo:  S("開場ラベル", "開場"),
    saisei: S("再生リストラベル", "再生リスト"),
    shikai: S("司会ラベル", "司会："),
  };
  state.labels = T;

  // 飾りの音符・マイク記号は見た目だけの話なのでCSS変数で差し込む
  const rootStyle = document.documentElement.style;
  rootStyle.setProperty("--note-mark", JSON.stringify(T.onpu ? T.onpu + " " : ""));
  rootStyle.setProperty("--mc-mark", JSON.stringify(T.mic ? T.mic + " " : ""));

  // ブラウザのタブに出る見出し
  document.title = S("タブ見出し", "真夜中音楽祭 タイムテーブル");

  // 表を1つでも読めず予備データを使ったときは、画面の一番上で必ず知らせる。
  // （黙って古いかもしれない内容を見せると、見た人が間違った時間・場所を信じてしまうため）
  if (usedFallback) {
    const warn = document.getElementById("loadWarning");
    if (warn) {
      warn.textContent = S("読込エラー案内",
        "⚠ 最新のタイムテーブルを読み込めませんでした。\n"
        + "いま出ている内容は予備のもので、最新ではないかもしれません。\n"
        + "通信のよい場所でページを更新してください。");
      warn.hidden = false;
    }
  }

  // スマホを縦に持ったときの案内
  const rotateText = document.getElementById("rotateText");
  if (rotateText) rotateText.textContent = S("回転案内", "スマートフォンを横向きにしてください");
  const rotateIcon = document.getElementById("rotateIcon");
  if (rotateIcon) rotateIcon.textContent = S("回転アイコン", "📱");

  // 時間軸の範囲を、進行と出演者の実データから決める（15分単位に丸める）
  const starts = [], ends = [];
  eventRows.forEach(e => {
    const s = toMin(e["開始時刻"]), t = toMin(e["終了時刻"]);
    if (s !== null) starts.push(s);
    if (t !== null) ends.push(t);
  });
  actRows.forEach(a => {
    const s = toMin(a["開始時刻"]), d = Number(a["演奏時間"]);
    if (s !== null && d > 0) { starts.push(s); ends.push(s + d); }
  });
  if (!starts.length) { starts.push(21 * 60); ends.push(23 * 60); }
  state.axisStart = Math.floor(Math.min(...starts) / 15) * 15;
  state.axisEnd = Math.ceil(Math.max(...ends) / 15) * 15;

  // 見出し
  const name = settings["イベント名"] || "音楽祭";
  const title = document.getElementById("title");
  const n1 = document.createElement("span"); n1.className = "n1"; n1.textContent = T.onpu;
  const n2 = document.createElement("span"); n2.className = "n2"; n2.textContent = T.onpu;
  title.replaceChildren(n1, document.createTextNode(" " + name + " "), n2);

  const dateLabel = state.eventDate
    ? state.eventDate.mo + "月" + state.eventDate.d + "日"
    : (settings["開催日未定時の表示"] || "9月◯日（仮）");
  const doorsMin = toMin(settings["開場時刻"]);
  const sep1 = S("副題の区切り1", "／");
  const timeSep = S("時刻の区切り", "–");
  const sep2 = S("副題の区切り2", "｜");
  // 同時開催ラベルは、数字も含めて書いた文字をそのまま出す（ステージ数の自動付けはしない）
  const dojiLabel = S("同時開催ラベル", stageRows.length + "ステージ同時開催");
  document.getElementById("subtitle").textContent =
    dateLabel
    + (doorsMin !== null ? " " + fmt(doorsMin) + " " + T.kaijo + " " + sep1 + " " : " ")
    + fmt(state.axisStart) + " " + timeSep + " " + fmt(state.axisEnd)
    + " " + sep2 + " " + dojiLabel;

  // 開催地（見出しと開場帯の間）。設定タブの「開催地」に文字があれば出す。空欄・行なしなら出さない。
  const venueEl = document.getElementById("venue");
  const venue = settings["開催地"];
  if (venue && String(venue).trim()) {
    venueEl.textContent = String(venue).replace(/\r\n?/g, "\n");
    venueEl.hidden = false;
  } else {
    venueEl.hidden = true;
  }

  const doors = document.getElementById("doors");
  if (doorsMin !== null) {
    const guide = settings["開場案内"] || "城下町ステージへどうぞ";
    const doorSep = S("開場帯の区切り", "—");
    doors.textContent = T.onpu + " " + fmt(doorsMin) + " " + T.kaijo + " " + doorSep + " " + guide + " " + T.onpu;
  } else {
    doors.style.display = "none";
  }

  // 注意書き（フッター下部）。「設定」タブが空欄なら、これまでどおりの文言を表示する
  const footer = document.getElementById("footer");
  const notice = settings["注意書き"]
    || "このページは真夜中音楽祭のタイムテーブルです。見るだけのページで、ログイン・入力・ダウンロードを求めることは一切ありません。";
  const p = document.createElement("p");
  p.textContent = String(notice).replace(/\r\n?/g, "\n");
  footer.replaceChildren(p);

  buildStages(stageRows, actRows);
  placeOverlays(eventRows);
  updateNow();

  // 文字の読み込みや画面幅の変化で位置がずれないよう、置き直す
  const replace = () => placeOverlays(eventRows);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(replace);
  let t;
  window.addEventListener("resize", () => { clearTimeout(t); t = setTimeout(replace, 150); });

  // 20秒ごとに「いま演奏中」を更新する
  setInterval(updateNow, 20000);
}

main();
</script>
